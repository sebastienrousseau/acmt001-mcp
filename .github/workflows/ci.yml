name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # acmt001-mcp depends on the core `acmt001` library, which is not yet
      # published to PyPI. Install it from its GitHub repository first, then
      # install this package (and its test deps) on top.
      - name: Install core acmt001 (from GitHub) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/sebastienrousseau/acmt001.git@feat/v0.0.1"
          pip install .
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install core acmt001 from GitHub so mypy can resolve `acmt001.services`.
      - name: Install core acmt001 (from GitHub) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/sebastienrousseau/acmt001.git@feat/v0.0.1"
          pip install .
          pip install ruff black mypy

      - name: Ruff check
        run: ruff check acmt001_mcp/

      - name: Black check
        run: black --check acmt001_mcp/ tests/

      - name: Mypy
        run: mypy acmt001_mcp/
